<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reyben Apps</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #222;
            text-align: center;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .app-card {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
        }

        a {
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reyben Apps</h1>
        <p>Portal oficial de aplicaciones desarrolladas por Reyben.</p>

        <div class="app-card">
            <h2>Detector de Billetes Bolivia</h2>
            <p>Aplicación para verificar series observadas de billetes bolivianos mediante OCR.</p>
            <a href="#">Disponible en Google Play</a>
        </div>

        <p style="margin-top:30px;">
            Sitio utilizado para verificación de <strong>app-ads.txt</strong>
        </p>
    </div>
</body>
</html>
