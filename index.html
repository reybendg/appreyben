<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reyben Apps</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 20px;
      color: #cbd5e1;
      margin-bottom: 50px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      max-width: 700px;
      margin: auto;
    }

    .app-title {
      font-size: 28px;
      margin-bottom: 15px;
    }

    .app-desc {
      font-size: 18px;
      line-height: 1.6;
      color: #e2e8f0;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
    }

    .footer {
      margin-top: 60px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reyben Apps</h1>
    <p class="subtitle">Aplicaciones útiles desarrolladas para Bolivia 🇧🇴</p>

    <div class="card">
      <div class="app-title">Detector de Billetes Bolivia</div>
      <div class="app-desc">
        Escanea la serie de billetes bolivianos y verifica si corresponde
        a rangos observados mediante OCR y validación automática.
      </div>
      <a class="btn" href="https://play.google.com/store/apps/details?id=com.reyben.detectbillingb" target="_blank">
        Descargar en Google Play
      </a>
    </div>

    <div class="footer">
      © 2026 Reyben Apps · Todos los derechos reservados
    </div>
  </div>
</body>
</html>
